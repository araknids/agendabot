spring.application.name=agendabot
server.port=8080

# WhatsApp Cloud API. Valores reais vêm de variável de ambiente (ver docs/06-setup-whatsapp).
# Os defaults abaixo servem só pra rodar testes/local sem segredo no arquivo.
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:dev-verify-token}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:dev-access-token}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:000000000000000}
whatsapp.api-base-url=${WHATSAPP_API_BASE_URL:https://graph.facebook.com/v21.0}
